<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet">
    <title>Weather Now</title>
</head>
<body>
    <main>
        <nav class="nav-bar">
            <div class="logo">
                <img src="images/logo.svg" alt="logo image">
            </div>
            <div class="units-toggle">
                <img src="images/icon-units.svg" alt="units icon">
                <p>Units</p>
                <img src="images/icon-dropdown.svg" alt="drop-down icon">
            </div>
        </nav>
        <section class="hero-search">
            <h1>How's the sky looking today?</h1>
            <div class="search-div">
                <div class="search-box">
                    <img src="images/icon-search.svg" alt="search icon">
                <input type="text" id="search-input" placeholder="Search for a city...">
                </div>
                <button id="search-btn">Search</button>
            </div>
        </section>
        <section class="today-card">
            <h2>Lusaka, Zambia</h2>
            <p>Wed, 27 May, 2026</p>
            <div class="today-temp-div">
                <img src="images/icon-sunny.webp" alt="weather icon">
                <span id="today-temp">17°</span>
            </div>
        </section>
    </main>
</body>
</html>
